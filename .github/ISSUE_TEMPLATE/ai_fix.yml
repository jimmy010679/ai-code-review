name: "🤖 AI 自動修復請求"
description: "使用 Gemini 自動修復 Bug (支援 [dev], [uat] 等分支)"
title: "[main] 檔案路徑 - 簡述" 
labels: ["fix-me"]
body:
  - type: markdown
    attributes:
      value: |
        > **💡 溫馨提醒**：請在標題最前方保留 `[分支名稱]` (例如 `[dev]` 或 `[uat]`)，系統將根據此標籤自動切換代碼基線。
  - type: textarea
    id: bug_desc
    attributes:
      label: "Bug 現象描述"
      placeholder: "目前首頁時間顯示為 2026/04/02，應改為 2026/04/12"
    validations:
      required: true
  - type: input
    id: path
    attributes:
      label: "涉及檔案路徑"
      placeholder: "例如：src/app/page.tsx"
    validations:
      required: true
  - type: input
    id: expected
    attributes:
      label: "預期的正確結果"
      placeholder: "例如：2026/04/12"