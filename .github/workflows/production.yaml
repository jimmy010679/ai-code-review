name: PROD deployment
run-name: ${{ github.actor }} is deploy PROD 🚀

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Ready to flow check
        run: |
          echo "🎉 The job was automatically triggered by a ${{ github.event_name }} event."
          echo "🔎 The name of your branch is ${{ github.ref }} and your repository is ${{ github.repository }}."

      - id: 'auth'
        uses: 'google-github-actions/auth@v3'
        with:
          project_id: '${{ vars.GCP_PROJECT_ID }}'
          workload_identity_provider: '${{ vars.GCP_WIF_PROVIDER }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'
  
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v1'
  
      - name: 'Verify Identity and Project'
        run: |
          echo "=== 目前啟用的身份 ==="
          gcloud auth list
          
          echo "=== 目前專案配置 ==="
          gcloud config get-value project

      - name: 'Log in to Artifact Registry'
        run: |
          gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: 'Build and Push Docker Image'
        run: |
          IMAGE_NAME="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPO_NAME }}/${{ vars.CLOUD_RUN_SERVICE_NAME }}:${{ github.sha }}"
          docker build -t "$IMAGE_NAME" .
          docker push "$IMAGE_NAME"
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV

      - name: 'Deploy to Cloud Run'
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          service: '${{ vars.CLOUD_RUN_SERVICE_NAME }}'
          region: '${{ vars.GCP_REGION }}'
          image: '${{ env.IMAGE_NAME }}'
          flags: '--allow-unauthenticated --port=3000'